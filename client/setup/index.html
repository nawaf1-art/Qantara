<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qantara Setup</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: #fffaf2;
      --ink: #1f2328;
      --muted: #636b74;
      --line: #d5c6b5;
      --accent: #0f766e;
      --accent-light: rgba(15, 118, 110, 0.10);
      --warn: #a16207;
      --green: #15803d;
      --red: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #fdf7ee 0, #f4f1ea 45%, #ebe3d5 100%);
      min-height: 100vh;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 2.2rem;
      font-weight: 600;
    }

    .subtitle {
      margin: 0 0 32px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 1.05rem;
    }

    .panel {
      background: rgba(255, 250, 242, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 14px 40px rgba(31, 35, 40, 0.08);
    }

    .section-label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 12px;
    }

    /* Backend cards */
    .backend-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .backend-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border: 1.5px solid var(--line);
      border-radius: 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: rgba(255, 255, 255, 0.5);
    }

    .backend-card:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .backend-card.selected {
      border-color: var(--accent);
      background: var(--accent-light);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .backend-card.unavailable {
      opacity: 0.5;
      cursor: default;
    }

    .backend-card.unavailable:hover {
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.5);
    }

    .backend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .backend-dot.available { background: var(--green); }
    .backend-dot.unavailable { background: var(--red); }

    .backend-info { flex: 1; min-width: 0; }

    .backend-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .backend-hint {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Config area */
    .config-area {
      margin-bottom: 24px;
      min-height: 0;
    }

    .config-area:empty { display: none; }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .config-group label {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .config-group select,
    .config-group input {
      font-family: inherit;
      font-size: 0.95rem;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    .config-group select:focus,
    .config-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-light);
    }

    /* Start button */
    .start-btn {
      appearance: none;
      display: block;
      width: 100%;
      padding: 14px;
      font: inherit;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .start-btn:hover { opacity: 0.9; }

    .start-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* Status message */
    .status-msg {
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 12px;
      min-height: 1.4em;
    }

    .status-msg.error { color: var(--red); }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 32px;
      color: var(--muted);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .loading-dots::after {
      content: "...";
      animation: pulse 1.2s infinite;
    }
  </style>
</head>
<body>
  <main>
    <h1>Qantara</h1>
    <p class="subtitle">Choose a backend to start your voice conversation.</p>

    <div class="panel">
      <span class="section-label">Available backends</span>
      <div id="backend-list" class="backend-list">
        <div class="loading"><span class="loading-dots">Detecting backends</span></div>
      </div>

      <div id="config-area" class="config-area"></div>

      <button id="start-btn" class="start-btn" disabled>Start Talking</button>
      <div id="status-msg" class="status-msg"></div>
    </div>
  </main>

  <script>
    (function () {
      "use strict";

      var backends = [];
      var selectedType = null;

      var listEl = document.getElementById("backend-list");
      var configEl = document.getElementById("config-area");
      var startBtn = document.getElementById("start-btn");
      var statusMsg = document.getElementById("status-msg");

      // -- Load saved selection from localStorage --
      var saved = null;
      try {
        saved = JSON.parse(localStorage.getItem("qantara_backend"));
      } catch (_) { /* ignore */ }

      // -- Fetch backends --
      fetch("/api/backends")
        .then(function (r) { return r.json(); })
        .then(function (data) {
          backends = data.backends || [];
          renderBackends();
          // Restore saved selection if backend is still available
          if (saved && saved.type) {
            var match = backends.find(function (b) {
              return b.type === saved.type && b.available;
            });
            if (match) {
              selectBackend(saved.type);
              restoreSavedConfig(saved);
            }
          }
        })
        .catch(function () {
          listEl.innerHTML =
            '<div class="loading" style="color:var(--red)">Could not reach gateway. Is the server running?</div>';
        });

      function renderBackends() {
        listEl.innerHTML = "";
        backends.forEach(function (b) {
          var card = document.createElement("div");
          card.className = "backend-card" + (b.available ? "" : " unavailable");
          if (b.type === selectedType) card.className += " selected";

          var dot = document.createElement("div");
          dot.className = "backend-dot " + (b.available ? "available" : "unavailable");

          var info = document.createElement("div");
          info.className = "backend-info";

          var name = document.createElement("div");
          name.className = "backend-name";
          name.textContent = b.name;

          var hint = document.createElement("div");
          hint.className = "backend-hint";
          hint.textContent = backendHint(b);

          info.appendChild(name);
          info.appendChild(hint);
          card.appendChild(dot);
          card.appendChild(info);

          if (b.available) {
            card.addEventListener("click", function () { selectBackend(b.type); });
          }

          listEl.appendChild(card);
        });
      }

      function backendHint(b) {
        if (!b.available) return "Not detected";
        switch (b.type) {
          case "mock": return "No backend needed \u2014 for testing";
          case "ollama":
            var n = (b.models || []).length;
            return n + " model" + (n !== 1 ? "s" : "") + " available";
          case "openclaw": return "Agent bridge detected";
          case "custom": return "Point to any backend URL";
          default: return "";
        }
      }

      function selectBackend(type) {
        selectedType = type;
        renderBackends();
        renderConfig();
        startBtn.disabled = !isConfigValid();
        statusMsg.textContent = "";
        statusMsg.className = "status-msg";
      }

      function renderConfig() {
        configEl.innerHTML = "";
        var b = backends.find(function (x) { return x.type === selectedType; });
        if (!b) return;

        switch (b.type) {
          case "ollama":
            var models = b.models || [];
            if (models.length === 0) {
              configEl.innerHTML = '<div class="config-group"><label>No models found in Ollama</label></div>';
              return;
            }
            var group = makeGroup("Model");
            var sel = document.createElement("select");
            sel.id = "cfg-model";
            models.forEach(function (m) {
              var opt = document.createElement("option");
              opt.value = m;
              opt.textContent = m;
              sel.appendChild(opt);
            });
            sel.addEventListener("change", function () {
              startBtn.disabled = !isConfigValid();
            });
            group.appendChild(sel);
            configEl.appendChild(group);
            break;

          case "openclaw":
            var grp = makeGroup("Agent ID");
            var inp = document.createElement("input");
            inp.type = "text";
            inp.id = "cfg-agent";
            inp.placeholder = "e.g. spectra";
            inp.addEventListener("input", function () {
              startBtn.disabled = !isConfigValid();
            });
            grp.appendChild(inp);
            configEl.appendChild(grp);
            break;

          case "custom":
            var grp2 = makeGroup("Backend URL");
            var inp2 = document.createElement("input");
            inp2.type = "url";
            inp2.id = "cfg-url";
            inp2.placeholder = "http://localhost:8080";
            inp2.addEventListener("input", function () {
              startBtn.disabled = !isConfigValid();
            });
            grp2.appendChild(inp2);
            configEl.appendChild(grp2);
            break;

          // mock: no config needed
        }
      }

      function makeGroup(labelText) {
        var g = document.createElement("div");
        g.className = "config-group";
        var lbl = document.createElement("label");
        lbl.textContent = labelText;
        g.appendChild(lbl);
        return g;
      }

      function restoreSavedConfig(s) {
        // Defer so DOM elements are rendered
        setTimeout(function () {
          if (s.type === "ollama" && s.model) {
            var sel = document.getElementById("cfg-model");
            if (sel) sel.value = s.model;
          } else if (s.type === "openclaw" && s.agent) {
            var inp = document.getElementById("cfg-agent");
            if (inp) inp.value = s.agent;
          } else if (s.type === "custom" && s.url) {
            var inp2 = document.getElementById("cfg-url");
            if (inp2) inp2.value = s.url;
          }
          startBtn.disabled = !isConfigValid();
        }, 0);
      }

      function isConfigValid() {
        if (!selectedType) return false;
        switch (selectedType) {
          case "mock": return true;
          case "ollama":
            var sel = document.getElementById("cfg-model");
            return sel && sel.value.length > 0;
          case "openclaw":
            var inp = document.getElementById("cfg-agent");
            return inp && inp.value.trim().length > 0;
          case "custom":
            var inp2 = document.getElementById("cfg-url");
            return inp2 && inp2.value.trim().length > 0;
          default: return false;
        }
      }

      function gatherPayload() {
        var payload = { type: selectedType };
        switch (selectedType) {
          case "ollama":
            var sel = document.getElementById("cfg-model");
            if (sel) payload.model = sel.value;
            break;
          case "openclaw":
            var inp = document.getElementById("cfg-agent");
            if (inp) payload.agent = inp.value.trim();
            break;
          case "custom":
            var inp2 = document.getElementById("cfg-url");
            if (inp2) payload.url = inp2.value.trim();
            break;
        }
        return payload;
      }

      // -- Start Talking --
      startBtn.addEventListener("click", function () {
        if (!isConfigValid()) return;

        var payload = gatherPayload();
        startBtn.disabled = true;
        statusMsg.textContent = "Configuring backend\u2026";
        statusMsg.className = "status-msg";

        fetch("/api/configure", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.error) {
              statusMsg.textContent = data.error;
              statusMsg.className = "status-msg error";
              startBtn.disabled = false;
              return;
            }
            // Persist selection
            localStorage.setItem("qantara_backend", JSON.stringify(payload));
            // Redirect to voice UI
            window.location.href = "/spike";
          })
          .catch(function (err) {
            statusMsg.textContent = "Failed to configure: " + err.message;
            statusMsg.className = "status-msg error";
            startBtn.disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
